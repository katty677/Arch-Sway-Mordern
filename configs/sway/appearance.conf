# Borders

default_border pixel 2


# Gaps

gaps inner 8
gaps outer 12


# Colors

client.focused          $accent $accent $background $accent $accent
client.unfocused        $background $background $foreground $background $background
client.urgent           #f38ba8 #f38ba8 $background #f38ba8 #f38ba8



# Window opacity (app_id matches Wayland-native apps, class matches XWayland)

for_window [app_id=".*"] opacity 0.95
for_window [class=".*"] opacity 0.95